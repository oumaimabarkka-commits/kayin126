<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Carte Fournisseurs Île-de-France</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 15px;
    background: #f4f4f4;
}

.header {
    display:flex;
    align-items:center;
    gap:15px;
    background:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

#map {
    height:600px;
    border-radius:8px;
}

.filters {
    background:white;
    padding:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    border-radius:8px;
}

select, input {
    padding:6px;
}

/* LEGEND */
.legend {
    background:white;
    padding:10px;
    border-radius:8px;
    max-height:400px;
    overflow:auto;
    width:240px;
    font-size:12px;
}

.legend span {
    display:flex;
    align-items:center;
    gap:8px;
    padding:3px;
    cursor:pointer;
}

.legend span:hover {
    background:#f0f0f0;
}

.legend-logo {
    width:20px;
    height:20px;
    object-fit:contain;
}

.legend-box {
    width:14px;
    height:14px;
    border-radius:3px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" style="height:50px;">
    <h3>Carte Fournisseurs</h3>
</div>

<div class="filters">
    <select id="filtreProduit" onchange="filtrer(); updateLegend();">
        <option value="">Produit : Tous</option>
    </select>

    <select id="filtreVille" onchange="filtrer()">
        <option value="">Ville : Toutes</option>
    </select>

    <select id="filtreCP" onchange="filtrer()">
        <option value="">CP : Tous</option>
    </select>

    <select id="filtreNom" onchange="filtrer()">
        <option value="">Fournisseur : Tous</option>
    </select>

    <input type="range" id="filtreRayon" min="0" max="50" value="0" oninput="filtrer()">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>

var map = L.map('map').setView([48.85, 2.35], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var markers = [];
var legendControl = null;

var dataGlobal = [];

function normalize(t){
    return (t||"").toString().toLowerCase().trim();
}

// LOAD CSV
fetch("data.csv")
.then(r=>r.text())
.then(csv=>{

    Papa.parse(csv,{
        header:true,
        complete:function(res){

            dataGlobal = res.data;

            let produits = new Set();
            let villes = new Set();
            let cps = new Set();
            let fournisseurs = new Set();

            res.data.forEach(row=>{

                produits.add(row["Produit"]);
                villes.add(row["ville"]);
                cps.add(row["CP"]);
                fournisseurs.add(row["fournisseur"]);

                let lat = parseFloat(row["latitude (fournisseur)"]);
                let lng = parseFloat(row["longitude (fournisseur)"]);

                if(!lat || !lng) return;

                let m = L.marker([lat,lng])
                .bindPopup(`
                    <b>${row["fournisseur"]}</b><br>
                    ${row["Produit"]}<br>
                    ${row["ville"]}
                `);

                m.data = row;
                markers.push(m);
                m.addTo(map);
            });

            fill("filtreProduit",produits,"Produit");
            fill("filtreVille",villes,"Ville");
            fill("filtreCP",cps,"CP");
            fill("filtreNom",fournisseurs,"Fournisseur");

            updateLegend();
        }
    });

});

// FILL SELECT
function fill(id,set,label){
    let s = document.getElementById(id);
    set.forEach(v=>{
        if(v){
            let o=document.createElement("option");
            o.value=v;
            o.textContent=v;
            s.appendChild(o);
        }
    });
}

// FILTER MAP
function filtrer(){

    let prod = normalize(document.getElementById("filtreProduit").value);
    let ville = normalize(document.getElementById("filtreVille").value);
    let cp = normalize(document.getElementById("filtreCP").value);
    let nom = normalize(document.getElementById("filtreNom").value);

    markers.forEach(m=>{

        let d = m.data;

        let ok = true;

        if(prod && normalize(d["Produit"]) != prod) ok=false;
        if(ville && normalize(d["ville"]) != ville) ok=false;
        if(cp && normalize(d["CP"]) != cp) ok=false;
        if(nom && normalize(d["fournisseur"]) != nom) ok=false;

        if(ok) m.addTo(map);
        else map.removeLayer(m);
    });

    updateLegend();
}

// LEGEND SYNCHRONIZED ONLY WITH PRODUCT
function updateLegend(){

    if(legendControl){
        map.removeControl(legendControl);
    }

    let selectedProduct = normalize(document.getElementById("filtreProduit").value);

    let fournisseurs = new Set();

    markers.forEach(m=>{
        let d = m.data;

        if(selectedProduct){

            if(normalize(d["Produit"]) == selectedProduct){
                fournisseurs.add(d["fournisseur"]);
            }

        } else {
            fournisseurs.add(d["fournisseur"]);
        }
    });

    legendControl = L.control({position:'bottomright'});

    legendControl.onAdd = function(){

        let div = L.DomUtil.create('div','legend');
        div.innerHTML = "<b>Fournisseurs</b><br>";

        Array.from(fournisseurs)
            .sort((a,b)=>a.localeCompare(b))   // TRI ALPHABETIQUE
            .forEach(f=>{

            let span = document.createElement("span");

            span.innerHTML = `
                <div class="legend-box"></div>
                ${f.toUpperCase()}   <!-- MAJUSCULE -->
            `;

            span.onclick = ()=> {
                document.getElementById("filtreNom").value = f;
                filtrer();
            };

            div.appendChild(span);
        });

        return div;
    };

    legendControl.addTo(map);
}

</script>

</body>
</html>
